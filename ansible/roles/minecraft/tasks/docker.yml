---
# -----------------------------
# Docker installation (Ubuntu 24.04+ / 26.04)
# -----------------------------

- name: Install required system packages (Ubuntu)
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes
  become: true

- name: Install APT HTTPS support packages
  apt:
    name:
      - software-properties-common
    state: present
    update_cache: yes
  become: true

- name: Ensure /etc/apt/keyrings exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true

- name: Download Docker GPG key (modern Ubuntu method)
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.gpg
    mode: '0644'
  become: true

- name: Add Docker repository (modern signed-by syntax)
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
  become: true

- name: Install Docker Engine
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
    update_cache: yes
  become: true

- name: Ensure Docker service is enabled and started
  systemd:
    name: docker
    enabled: true
    state: started
  become: true

- name: Add ubuntu to docker group
  user:
    name: ubuntu
    groups: docker
    append: true
  become: true

# -----------------------------
# AWS CLI v2 installation
# -----------------------------

- name: Check whether AWS CLI v2 is already installed
  command: aws --version
  register: aws_cli_version
  changed_when: false
  failed_when: false

- name: Download AWS CLI v2 installer
  get_url:
    url: "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"
    dest: /tmp/awscliv2.zip
    mode: "0644"
  when: aws_cli_version.rc != 0

- name: Unzip AWS CLI v2 installer
  unarchive:
    src: /tmp/awscliv2.zip
    dest: /tmp/
    remote_src: true
  when: aws_cli_version.rc != 0

- name: Install AWS CLI v2
  command: /tmp/aws/install
  become: true
  when: aws_cli_version.rc != 0
  changed_when: true

