---
# Polls the Minecraft container logs until the server signals readiness,
# or fails after a configurable timeout.

- name: Wait for Minecraft server to report 'Done' in logs
  ansible.builtin.shell: |
    docker logs {{ container_name }} 2>&1 | grep -q "Done"
  register: mc_done
  retries: 30
  delay: 10
  until: mc_done.rc == 0
  changed_when: false
  become: true

- name: Print last 20 log lines for audit
  ansible.builtin.shell: docker logs {{ container_name }} | tail -n 20
  register: mc_tail
  changed_when: false
  become: true

- name: Show last 20 log lines
  ansible.builtin.debug:
    msg: "{{ mc_tail.stdout_lines }}"

