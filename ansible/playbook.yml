---
# ── Minecraft EC2 Playbook ────────────────────────────────────────────────────
# Usage (fresh deploy):
#   ansible-playbook -i inventory/hosts.example playbook.yml \
#     -e "image_tag=<tag>"
#
# Usage (restore world from S3 before start):
#   ansible-playbook -i inventory/hosts.example playbook.yml \
#     -e "image_tag=<tag> restore_from_s3=true"
#
# Usage (backup only):
#   ansible-playbook -i inventory/hosts.example playbook.yml --tags backup
#
# After `terraform apply`, grab the public IP:
#   export MC_IP=$(terraform output -raw minecraft_public_ip)
#   ansible-playbook -i inventory/hosts.example playbook.yml \
#     -e "ansible_host=${MC_IP} image_tag=${MINECRAFT_IMAGE_TAG}"

- name: Configure Minecraft EC2 server
  hosts: minecraft
  gather_facts: true
  become: false  # individual tasks escalate as needed

  vars_files:
    - vars.yml

  pre_tasks:
    - name: Verify connection and print host facts
      ansible.builtin.debug:
        msg: >
          Connected to {{ inventory_hostname }}
          ({{ ansible_distribution }} {{ ansible_distribution_version }}).
          Image: {{ full_image }}

  roles:
    - role: minecraft

  post_tasks:
    - name: Print connection info
      ansible.builtin.debug:
        msg: >
          Server ready.
          Connect via Minecraft at {{ ansible_host }}:{{ minecraft_port }}.
          SSH: ssh -i ~/.ssh/your-key.pem ec2-user@{{ ansible_host }}
