---
# ── Ansible Variables ─────────────────────────────────────────────────────────

# AWS region (still used for S3 backups)
aws_region: "us-west-2"

# Docker Hub image (replaces all ECR variables)
image_tag: "{{ lookup('env', 'MINECRAFT_IMAGE_TAG') | default('latest') }}"
full_image: "mccabria/minecraft-server:{{ image_tag }}"

# S3 world storage (still used for restore/backup)
s3_bucket: "your-minecraft-world-bucket"     # ← replace with your bucket
s3_world_prefix: "worlds/world"
restore_from_s3: false

# Container settings
container_name: "minecraft"
data_dir: "/opt/minecraft/data"
minecraft_port: 25565

# Java / server environment
java_mem_initial: "2G"
java_mem_max: "4G"
eula: "TRUE"

container_env:
  EULA: "{{ eula }}"
  MEMORY: "{{ java_mem_max }}"
  TYPE: "VANILLA"
  VERSION: "LATEST"
  MOTD: "Brian McCarthy - CS312 Minecraft Server"

# Docker restart policy
restart_policy: "unless-stopped"

